# Meta-DT style transformer (in-context DT)
state_dim: 27
act_dim: 8
context_dim: 16
hidden_size: 128
max_length: 20
# Timestep embedding: indices must be < max_ep_len (raise for very long single-trajectory prompts).
max_ep_len: 1000
n_layer: 3
n_head: 1
n_inner: null
activation_function: relu
resid_pdrop: 0.1
attn_pdrop: 0.1
# GPT-2 max sequence length (tokens). With condition_rtg, tokens ≈ 3 * (prompt_steps + query_steps).
n_positions: 20000
action_tanh: true
# Backbone: gpt2 (custom) or llama2 (set llama_model_name, e.g. meta-llama/Llama-2-7b-hf)
transformer_backbone: gpt2
llama_model_name: null
use_vision: false
use_language: false
num_views: 2
image_embed_dim: 256
# ICRT-style: only compute action loss on query segment (default true)
query_loss_only: false
# Heads / inputs (match schema + build_model common dict)
predict_returns: false
predict_state: false
condition_rtg: true
# Trial index: which context trajectory (sorted prompt order) each token belongs to; query uses index = num_context.
use_trial_index_embedding: false
max_trial_embeddings: 64

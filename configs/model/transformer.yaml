# Meta-DT style transformer (in-context DT)
state_dim: 27
act_dim: 8
context_dim: 16
hidden_size: 128
max_length: 20
# Timestep embedding: indices must be < max_ep_len (raise for very long single-trajectory prompts).
max_ep_len: 1000
n_layer: 3
n_head: 1
n_inner: null
activation_function: relu
resid_pdrop: 0.1
attn_pdrop: 0.1
# GPT-2 max sequence length (tokens). With condition_rtg, tokens ≈ 3 * (prompt_steps + query_steps).
n_positions: 20000
action_tanh: true
# Backbone: gpt2 (custom) or llama2 (set llama_model_name, e.g. meta-llama/Llama-2-7b-hf)
transformer_backbone: gpt2
llama_model_name: null
use_vision: false
use_language: false
# If true, fuse instruction embedding into state (VLA); default false
use_language_input: false
num_views: 1
image_embed_dim: 256
# Vision encoder (used when use_vision=true): patch | crossmae | dinov2 | dinov3 | paligemma
vision_encoder_type: patch
vision_encoder_pool: true
vision_encoder_attention_pool: false
freeze_vision_encoder: false
vision_encoder_chunk_size: 8
vision_encoder_img_size: null
# When data.use_precomputed_embeddings=true, set dim (e.g. 1536); else null
precomputed_vision_embed_dim: null
vision_proprio_attention_fusion: true
# null -> derived from condition_rtg / data.context_style in train
sequence_token_layout: null
# ICRT-style: only compute action loss on query segment (default true)
query_loss_only: false
# Heads / inputs (match schema + build_model common dict)
predict_returns: false
predict_state: false
condition_rtg: true
# Trial index: which context trajectory (sorted prompt order) each token belongs to; query uses index = num_context.
use_trial_index_embedding: true
max_trial_embeddings: 64

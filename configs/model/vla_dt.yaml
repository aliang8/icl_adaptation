# VLA (Vision-Language-Action) DT for ICRT-MT / robot manipulation.
# Use with data=[base,icrt_mt]: --override data=[base,icrt_mt] model=vla_dt
state_dim: 27
act_dim: 8
context_dim: 16
hidden_size: 128
max_length: 32
max_ep_len: 512
n_layer: 3
n_head: 1
n_inner: null
activation_function: relu
resid_pdrop: 0.1
attn_pdrop: 0.1
n_positions: 1024
action_tanh: true
# VLA
use_vision: true
use_language: true
num_views: 2
image_embed_dim: 256
# Transformer: gpt2 (custom) or llama2 (set llama_model_name e.g. meta-llama/Llama-2-7b-hf)
transformer_backbone: gpt2
llama_model_name: null
# Vision encoder: patch | crossmae | dinov2 | dinov3 | paligemma
vision_encoder_type: patch
vision_encoder_pool: true
# ICRT-style attention pooling over patch tokens (set true for crossmae/dinov2 to compress patches to one token per view)
vision_encoder_attention_pool: false
# Freeze vision encoder (only train vision_proj + transformer); set true for pretrained dinov2/dinov3
freeze_vision_encoder: false
# Process vision encoder in chunks of N images (null = no chunking). Default 8 reduces OOM with dinov2.
vision_encoder_chunk_size: 8
# When data.use_precomputed_embeddings=true, set to embedding dim (e.g. 1536 for dinov2 2 views). Vision encoder is not loaded at train time; needed for inference.
precomputed_vision_embed_dim: null
# ICRT-style: only compute action loss on query segment (default true)
query_loss_only: true

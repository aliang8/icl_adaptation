# Top-level config: composes model, data, optim, system, experiment, paths.
# Override from CLI: python -m src.train model=transformer data=ant_dir paths.data_root=/data
defaults:
  - model: transformer
  - data: ant_dir
  - optim: adamw
  - system: single_gpu
  - experiment: base
  - paths: default
  - _self_

# Optional run overrides (CLI)
run_name: null
resume: null
eval_only: false
export_only: null

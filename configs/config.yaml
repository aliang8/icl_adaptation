# Top-level config: composes model, data, optim, system, experiment, paths.
# Override from CLI: python -m src.train model=transformer data=[base,ant_dir] paths.data_root=/data
# Data group: base is always merged first. Use data=[base,icrt_mt] or data=[base,libero_cosmos] for other datasets.
defaults:
  - model: transformer
  - data: [base, ant_dir]
  - optim: adamw
  - system: single_gpu
  - experiment: base
  - paths: default
  - _self_

# Optional run overrides (CLI)
run_name: null
resume: null
eval_only: false
export_only: null

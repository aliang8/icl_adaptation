# ICRT-MT with full in-context trajectories (prompt = whole demo(s), capped by max_total_prompt_length).
# Use: data=[base,icrt_mt_full_trajectory] model=vla_dt
# Inherits from base; overrides below match icrt_mt and set full_trajectory.
env_name: ICRT-MT
data_quality: ""
dataset_config_json: datasets/ICRT-MT/dataset_config.json
context_dim: 16
image_keys:
  - observation/exterior_image_1_left
  - observation/wrist_image_left
proprio_keys:
  - observation/cartesian_position
  - observation/gripper_position
action_keys:
  - action/cartesian_position
  - action/gripper_position
use_language: true
use_vision: true
horizon: 32
prompt_length: 8
return_scale: 1.0
batch_size: 16
num_workers: 2
num_tasks: 20
num_train_tasks: 20
num_context_trajectories: 3
context_style: full_trajectory
max_total_prompt_length: 256
lazy_dataset: true
max_training_examples: 200000
max_episode_steps: 512
image_size: [224, 224]
min_trajectory_length: 10
max_trajectory_length: 450

# Shared data config defaults (merged with every data=... choice).
# Override in ant_dir, halfcheetah, icrt_mt, libero_cosmos, etc.
data_dir: datasets
data_quality: ""
horizon: 20
# Query = last K steps of current trajectory (K=1 is OpenVLA-style; null = use horizon)
query_history_length: null
prompt_length: 5
return_scale: 500.0
batch_size: 128
num_workers: 0
num_tasks: 50
num_train_tasks: 45
max_episode_steps: 200
context_horizon: 4
context_dim: 16
context_hidden_dim: 128
num_context_trajectories: 1
# Train with random m in {0..N} prior context trajectories (N above); false = always use N when pool non-empty
randomize_num_context_trajectories: true
context_sort_ascending: true
context_sampling: stratified
# max_total_prompt_length: null -> max_episode_steps * (num_context_trajectories + 1) at runtime
max_total_prompt_length: null
# max_prompt_trajectory_length: null = full each context demo (subject to context_subsample_strategy)
max_prompt_trajectory_length: null

# How to subsample each context trajectory: none (full trajectory) | last | uniform | random
context_subsample_strategy: none
context_style: full_trajectory
lazy_dataset: true
max_training_examples: 500000
task_instructions: null
# ICRT / robot
dataset_config_json: null
use_vision: false
use_language: false
use_precomputed_embeddings: false
image_keys: null
image_size: null
proprio_keys: null
action_keys: null
min_trajectory_length: 10
max_trajectory_length: 450
# LIBERO
libero_repo_id: nvidia/LIBERO-Cosmos-Policy
seed: 0
# Reward preprocessing for offline trajectories (HalfCheetah pkl). none | constant | standardize | minmax
reward_normalization: none
reward_norm_constant: 1000.0
reward_norm_epsilon: 1.0e-8
# Optional JSON stats path (standardize/minmax use fixed stats)
reward_normalization_stats_path: null

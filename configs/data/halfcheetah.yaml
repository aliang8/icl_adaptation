# D4RL HalfCheetah: mixed expertise (medium, medium-expert, etc.)
# Data from scripts/download_d4rl_halfcheetah.py -> datasets/HalfCheetah-v2/<quality>/
env_name: HalfCheetah-v2
data_quality: medium_expert
data_dir: datasets
horizon: 20
prompt_length: 5
return_scale: 5000.0
batch_size: 128
num_workers: 0
num_tasks: 1
num_train_tasks: 1
max_episode_steps: 1000
context_horizon: 4
context_dim: 16
context_hidden_dim: 128
num_context_trajectories: 3
context_sort_ascending: true
context_sampling: random
max_total_prompt_length: 60
# subsampled = prompt_length (5) steps per context traj; full_trajectory = whole traj, cap by max_total_prompt_length
context_style: subsampled
# Lazy build: sample on the fly up to max_training_examples (faster startup; no prebuild of all segments)
lazy_dataset: true
max_training_examples: 500000
# ICRT-style language instructions (one per task); null for HalfCheetah, set for robot manipulation later
task_instructions: null

# D4RL HalfCheetah: mixed expertise
# Data from scripts/download_d4rl_halfcheetah.py -> datasets/HalfCheetah-v2/<quality>/
env_name: HalfCheetah-v2
data_quality: medium_expert
return_scale: 5000.0
num_tasks: 1
num_train_tasks: 1
max_episode_steps: 1000
num_context_trajectories: 3
max_total_prompt_length: 60   # increase to 256 (and set context_style=full_trajectory) for full-context demos
max_prompt_trajectory_length: null  # when context_style=full_trajectory, cap each demo to this many steps
context_style: subsampled
lazy_dataset: true
max_training_examples: 500000
task_instructions: null

# LIBERO-Cosmos-Policy: nvidia/LIBERO-Cosmos-Policy on HuggingFace
# 1) Download HDF5: huggingface-cli download nvidia/LIBERO-Cosmos-Policy --repo-type dataset --local-dir <data_dir>/LIBERO-Cosmos-Policy
# 2) Convert: python scripts/convert_libero_hdf5_to_dataset.py --input-dir <data_dir>/LIBERO-Cosmos-Policy
# env_name is the LIBERO benchmark suite (libero_10, libero_spatial, libero_object, libero_goal, libero_90)
env_name: libero_10
data_quality: ""
libero_repo_id: nvidia/LIBERO-Cosmos-Policy
use_language: true
use_vision: false  # set true with model=vla_dt when using image-enabled loader (Parquet)
# Set true after running scripts/precompute_libero_embeddings.py to load embeddings from npz (no vision encoder at train time)
use_precomputed_embeddings: false
# Primary and wrist camera keys in Hub/Parquet; HDF5 loader currently provides proprio only
image_keys:
  - primary_images_jpeg
  - wrist_images_jpeg
proprio_keys:
  - proprio
horizon: 32
prompt_length: 8
return_scale: 1.0
batch_size: 128
num_workers: 2
num_tasks: 20
num_train_tasks: 20
num_context_trajectories: 3
# context_style: subsampled
context_style: full_trajectory
lazy_dataset: true
max_training_examples: 200000
max_episode_steps: 100
image_size: [256, 256]
min_trajectory_length: 10
max_trajectory_length: 400

max_total_prompt_length: null     # null = no cap (use full concatenated prompt); set to N to trim to last N steps
max_prompt_trajectory_length: null  # null = use full trajectory; set to N to cap each context demo to last N steps

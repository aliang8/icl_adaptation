# LIBERO-Cosmos-Policy: nvidia/LIBERO-Cosmos-Policy on HuggingFace
# Download: python scripts/download_libero_cosmos.py --output-dir datasets
env_name: LIBERO-Cosmos
data_quality: ""
libero_manifest: datasets/LIBERO-Cosmos-Policy/manifest.json
libero_repo_id: nvidia/LIBERO-Cosmos-Policy
use_language: true
use_vision: false
horizon: 32
prompt_length: 8
return_scale: 1.0
batch_size: 16
num_workers: 2
num_tasks: 20
num_train_tasks: 20
num_context_trajectories: 3
context_style: subsampled
lazy_dataset: true
max_training_examples: 200000
max_episode_steps: 512
image_size: [256, 256]
min_trajectory_length: 10
max_trajectory_length: 400

# LIBERO-Cosmos-Policy: nvidia/LIBERO-Cosmos-Policy on HuggingFace
# Download: python scripts/download_libero_cosmos.py --output-dir datasets
# env_name is the LIBERO benchmark suite (libero_10, libero_spatial, libero_object, libero_goal, libero_90)
env_name: libero_10
data_quality: ""
libero_manifest: datasets/LIBERO-Cosmos-Policy/manifest.json
libero_repo_id: nvidia/LIBERO-Cosmos-Policy
use_language: true
use_vision: false  # set true with model=vla_dt when using image-enabled loader (Parquet)
# Primary and wrist camera keys in Hub/Parquet; HDF5 loader currently provides proprio only
image_keys:
  - primary_images_jpeg
  - wrist_images_jpeg
proprio_keys:
  - proprio
horizon: 32
prompt_length: 8
return_scale: 1.0
batch_size: 16
num_workers: 2
num_tasks: 20
num_train_tasks: 20
num_context_trajectories: 3
# context_style: subsampled
context_style: full_trajectory
lazy_dataset: true
max_training_examples: 200000
max_episode_steps: 100
image_size: [256, 256]
min_trajectory_length: 10
max_trajectory_length: 400

max_total_prompt_length: 256      # used when context_style=full_trajectory
max_prompt_trajectory_length: 85  # cap each context demo to last N steps when full_trajectory

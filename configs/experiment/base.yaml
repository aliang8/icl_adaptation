max_steps: 500000
eval_every_steps: 1000
num_eval_episodes: 5
num_eval_rollouts: 5  # number of env rollouts per evaluation
save_eval_video: false  # set true to save eval rollout videos to viz/samples/step_XXX/videos/
run_action_compare_eval: false  # set true to save pred vs GT action plots to viz/action_compare/step_XXX/
